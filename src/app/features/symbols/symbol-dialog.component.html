<h2 mat-dialog-title>{{ isEditMode ? 'Edit Symbol' : 'Add Symbol' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="symbol-form">
    <mat-form-field appearance="outline">
      <mat-label>Symbol</mat-label>
      <input matInput formControlName="symbol" maxlength="20" placeholder="AAPL" />
      <mat-error>Symbol is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Display Name</mat-label>
      <input matInput formControlName="fullName" maxlength="120" placeholder="Apple Inc." />
      <mat-error>Display name is required.</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancel</button>
  <button mat-raised-button color="primary" type="button" (click)="submit()">
    {{ isEditMode ? 'Save Changes' : 'Add Symbol' }}
  </button>
</mat-dialog-actions>
