<section class="sign-in-page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Sign In Required</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <p>Sign in with Google to access your StockTrader portfolio data.</p>
      @if (errorMessage) {
        <p class="error-text">{{ errorMessage }}</p>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" type="button" [disabled]="isSigningIn" (click)="signIn()">
        {{ isSigningIn ? 'Signing in...' : 'Continue with Google' }}
      </button>
    </mat-card-actions>
  </mat-card>
</section>
